<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a7a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F2D52;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg2)"/>
  <!-- Panama skyline abstract -->
  <g opacity="0.12" fill="#fff">
    <rect x="100" y="250" width="60" height="200" rx="4"/>
    <rect x="180" y="180" width="50" height="270" rx="4"/>
    <rect x="250" y="220" width="70" height="230" rx="4"/>
    <rect x="340" y="150" width="55" height="300" rx="4"/>
    <rect x="420" y="200" width="65" height="250" rx="4"/>
    <rect x="510" y="170" width="45" height="280" rx="4"/>
    <rect x="580" y="240" width="75" height="210" rx="4"/>
    <rect x="680" y="260" width="50" height="190" rx="4"/>
  </g>
  <!-- Home icon -->
  <g transform="translate(360, 100)" opacity="0.2">
    <path d="M40 0 L80 35 L80 80 L0 80 L0 35 Z" fill="#22C55E"/>
    <rect x="30" y="50" width="20" height="30" fill="#0F2D52"/>
  </g>
  <!-- Accent circles -->
  <circle cx="650" cy="120" r="60" fill="#22C55E" opacity="0.08"/>
  <circle cx="150" cy="480" r="90" fill="#22C55E" opacity="0.06"/>
  <!-- Water line -->
  <rect x="0" y="450" width="800" height="150" fill="#0a1f3a" opacity="0.5"/>
  <!-- Text -->
  <text x="400" y="530" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="20" fill="rgba(255,255,255,0.25)">PANAMA IMAGE — Replace with real photo</text>
</svg>
